bio: |
  Yibin Zhou builds tools and conducts research at the intersection of
  biology, data, and code. His work uses skin as a model tissue to study
  cellular dynamics, tissue regeneration, and spatial organization, with
  a current focus on atopic dermatitis and cutaneous squamous cell
  carcinoma. He is currently preparing for a PhD in computational biology.

